
<h2>Log In</h2>
<form method="post">
  {% csrf_token %}
  {{ form }}
  <button type="submit">Log In</button>
</form>
<a href="{% url 'expense:password_reset' %}"><i>Forgot Password?</i></a>
{% if messages %}
  {% for message in messages %}
    {{ message }}
  {% endfor %}
{% endif %}
<p>
    <a href="{% url 'expense:register' %}">Register</a>
</p>
