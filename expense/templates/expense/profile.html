{% extends "expense/header.html" %}

{% load static %}
<link rel="stylesheet" href="{% static 'styles.css' %}">

{% block content %}

<form method="POST" enctype="multipart/form-data"   >
	{% csrf_token %}
	<h2>Profile Update</h2>
	{{ form.as_p }}		
	<input type="submit" value="Update" />
</form>
{% if messages %}
  {% for message in messages %}
    {{ message }}
  {% endfor %}
{% endif %}
	<p>
        <a href="{% url 'expense:dashboard' %}">dashbaord</a>
    </p>
{% endblock content%}
